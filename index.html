<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oliver Heinz · Blog</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg2: #161616;
    --border: #262626;
    --text: #d8d8d8;
    --text-dim: #666;
    --text-faint: #3a3a3a;
    --accent: #c8c8c8;
    --link: #8ab4d4;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── Passwort-Overlay ─────────────────────────────────────── */
  #overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
  }
  #overlay.versteckt { display: none; }
  .pw-box {
    text-align: center; max-width: 320px; width: 90%;
  }
  .pw-box h2 {
    font-size: 1em; font-weight: 400; letter-spacing: .15em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 32px;
  }
  .pw-box input {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); padding: 11px 16px; border-radius: 3px;
    font-size: 1em; text-align: center; letter-spacing: .2em;
  }
  .pw-box input:focus { outline: none; border-color: #555; }
  .pw-box button {
    margin-top: 12px; width: 100%; background: #222; border: 1px solid var(--border);
    color: var(--accent); padding: 10px; border-radius: 3px; cursor: pointer;
    font-size: .85em; letter-spacing: .1em; text-transform: uppercase;
  }
  .pw-box button:hover { background: #2a2a2a; }
  .pw-fehler { color: #b55; font-size: .8em; margin-top: 8px; display: none; }

  /* ── Layout ───────────────────────────────────────────────── */
  #inhalt { display: none; }
  #inhalt.sichtbar { display: block; }

  header {
    padding: 40px 48px 32px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: .85em; font-weight: 400; letter-spacing: .2em;
    text-transform: uppercase; color: var(--text-dim);
  }

  .container {
    max-width: 860px; margin: 0 auto; padding: 0 32px;
  }

  /* ── Einträge ─────────────────────────────────────────────── */
  .eintrag {
    padding: 56px 0;
    border-bottom: 1px solid var(--border);
  }
  .eintrag:last-child { border-bottom: none; }

  .eintrag-meta {
    font-size: .78em; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 14px;
    font-family: -apple-system, sans-serif;
  }

  .eintrag-titel {
    font-size: 1.9em; font-weight: 300; letter-spacing: -.01em;
    color: var(--accent); margin-bottom: 22px; line-height: 1.25;
  }

  .eintrag-text {
    color: #aaa; font-size: .97em; line-height: 1.8;
    max-width: 640px;
  }
  .eintrag-text p { margin-bottom: .9em; }
  .eintrag-text strong { color: var(--text); }
  .eintrag-text em { color: #999; }

  /* ── Foto-Grid ────────────────────────────────────────────── */
  .foto-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 6px;
    margin-top: 32px;
  }
  .foto-grid.einzeln { grid-template-columns: 1fr; max-width: 640px; }
  .foto-grid.zweier  { grid-template-columns: repeat(2, 1fr); }

  .foto-item { position: relative; overflow: hidden; background: var(--bg2); }
  .foto-item img {
    width: 100%; aspect-ratio: 3/2; object-fit: cover;
    display: block; cursor: zoom-in;
    transition: opacity .2s;
  }
  .foto-item img:hover { opacity: .88; }
  .foto-caption {
    font-size: .75em; color: var(--text-dim); padding: 6px 2px;
    font-family: -apple-system, sans-serif;
  }

  /* ── Lightbox ─────────────────────────────────────────────── */
  #lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.92); z-index: 1000;
    align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.offen { display: flex; }
  #lightbox img {
    max-width: 94vw; max-height: 92vh;
    object-fit: contain; border-radius: 2px;
    box-shadow: 0 8px 40px rgba(0,0,0,.8);
  }
  #lb-schliessen {
    position: fixed; top: 20px; right: 28px;
    color: #777; font-size: 1.8em; cursor: pointer; line-height: 1;
    background: none; border: none;
  }
  #lb-schliessen:hover { color: #ccc; }

  /* ── Responsive ───────────────────────────────────────────── */
  @media (max-width: 600px) {
    header { padding: 24px 20px 20px; }
    .container { padding: 0 20px; }
    .eintrag { padding: 40px 0; }
    .eintrag-titel { font-size: 1.5em; }
    .foto-grid, .foto-grid.zweier { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Passwort-Overlay -->
<div id="overlay">
  <div class="pw-box">
    <h2>Oliver Heinz · Privater Blog</h2>
    <input type="password" id="pw-eingabe" placeholder="Passwort" autocomplete="current-password">
    <button onclick="pwPruefen()">Zugang</button>
    <p class="pw-fehler" id="pw-fehler">Falsches Passwort.</p>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="lightboxSchliessen()">
  <button id="lb-schliessen" onclick="lightboxSchliessen()">×</button>
  <img id="lb-bild" src="" alt="">
</div>

<script>
const PASSWORT = "Brassertweg";
const SCHLUESSEL = 'fotoblog_auth';

function pwPruefen() {
  const eingabe = document.getElementById('pw-eingabe').value;
  if (eingabe === PASSWORT) {
    sessionStorage.setItem(SCHLUESSEL, '1');
    dokFreischalten();
  } else {
    document.getElementById('pw-fehler').style.display = 'block';
    document.getElementById('pw-eingabe').value = '';
    document.getElementById('pw-eingabe').focus();
  }
}

function dokFreischalten() {
  document.getElementById('overlay').classList.add('versteckt');
  document.getElementById('inhalt').classList.add('sichtbar');
}

document.getElementById('pw-eingabe').addEventListener('keydown', e => {
  if (e.key === 'Enter') pwPruefen();
});

if (sessionStorage.getItem(SCHLUESSEL) === '1') {
  dokFreischalten();
}

// Lightbox
function lightboxOeffnen(img) {
  document.getElementById('lb-bild').src = img.src;
  document.getElementById('lightbox').classList.add('offen');
  document.body.style.overflow = 'hidden';
}
function lightboxSchliessen() {
  document.getElementById('lightbox').classList.remove('offen');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') lightboxSchliessen();
});
</script>
</body>
